<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geschiedenis — Tandem</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --accent: #e94560;
      --text: #eee;
      --text-dim: #888;
      --input-bg: #0f3460;
      --success: #4ecca3;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px;
      max-width: 800px;
      margin: 0 auto;
    }
    h1 { font-size: 28px; margin-bottom: 20px; }
    .search-wrap { margin-bottom: 24px; display: flex; gap: 10px; }
    .search-input {
      flex: 1;
      background: var(--input-bg);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }
    .clear-btn {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
    }
    .clear-btn:hover { opacity: 0.85; }
    .history-list { display: flex; flex-direction: column; gap: 2px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); }
    .hi-favicon { width: 18px; height: 18px; border-radius: 2px; flex-shrink: 0; }
    .hi-title { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hi-url { font-size: 11px; color: var(--text-dim); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hi-time { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
    .hi-visits { font-size: 10px; color: var(--accent); flex-shrink: 0; }
    .empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px; }
  </style>
</head>
<body>
  <h1>📜 Geschiedenis</h1>
  <div class="search-wrap">
    <input class="search-input" id="search" type="text" placeholder="Zoek in geschiedenis...">
    <button class="clear-btn" id="clear-btn">Wis alles</button>
  </div>
  <div class="history-list" id="history-list">
    <div class="empty">Laden...</div>
  </div>

  <script>
    const listEl = document.getElementById('history-list');
    const searchEl = document.getElementById('search');
    const clearBtn = document.getElementById('clear-btn');

    async function loadHistory(query) {
      try {
        const url = query
          ? `http://localhost:8765/history/search?q=${encodeURIComponent(query)}`
          : `http://localhost:8765/history?limit=200`;
        const resp = await fetch(url);
        if (!resp.ok) return;
        const data = await resp.json();
        const entries = data.entries || data.results || [];
        listEl.innerHTML = '';
        if (entries.length === 0) {
          listEl.innerHTML = '<div class="empty">Geen geschiedenis gevonden.</div>';
          return;
        }
        for (const entry of entries) {
          let hostname = '';
          try { hostname = new URL(entry.url).hostname; } catch {}
          const time = new Date(entry.lastVisitTime).toLocaleString('nl-BE', {
            day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
          });
          const item = document.createElement('div');
          item.className = 'history-item';
          item.innerHTML = `
            <img class="hi-favicon" src="https://www.google.com/s2/favicons?domain=${hostname}&sz=32" onerror="this.style.display='none'">
            <span class="hi-title">${entry.title || hostname || entry.url}</span>
            <span class="hi-url">${hostname}</span>
            <span class="hi-visits">${entry.visitCount}×</span>
            <span class="hi-time">${time}</span>
          `;
          item.addEventListener('click', () => {
            window.parent.postMessage({ type: 'tandem-newtab-navigate', url: entry.url }, '*');
          });
          listEl.appendChild(item);
        }
      } catch {
        listEl.innerHTML = '<div class="empty">Kan geschiedenis niet laden.</div>';
      }
    }

    let searchTimeout;
    searchEl.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => loadHistory(searchEl.value.trim()), 300);
    });

    clearBtn.addEventListener('click', async () => {
      if (!confirm('Wil je alle geschiedenis wissen?')) return;
      try {
        await fetch('http://localhost:8765/history/clear', { method: 'DELETE' });
        loadHistory('');
      } catch {}
    });

    loadHistory('');
  </script>
</body>
</html>
